services:
  ct-lio:
    build: .
    image: ct-lio:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./bags:/bags:ro
    network_mode: host
    stdin_open: true
    tty: true
